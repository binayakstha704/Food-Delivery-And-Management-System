<VirtualHost *:80>
    ServerName 20.17.161.112
    DocumentRoot /var/www/html
    DirectoryIndex index.php index.html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Deny direct HTTP access to backend/sensitive directories.
    <DirectoryMatch "^/var/www/html/(config|includes|database|logs|vendor)(/|$)">
        Require all denied
    </DirectoryMatch>

    # Deny sensitive files.
    <FilesMatch "(^\.|composer\.(json|lock)$|package(-lock)?\.json$|.*\.(sql|md|log|bak|backup|old|orig|env|ini|yml|yaml)$)">
        Require all denied
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/herald-canteen-error.log
    CustomLog ${APACHE_LOG_DIR}/herald-canteen-access.log combined
</VirtualHost>
